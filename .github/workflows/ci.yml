name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Static quality gate
        run: just check

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: just unit

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Coverage gate
        run: just coverage

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality, unit, coverage]
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
